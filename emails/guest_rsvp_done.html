<!doctype html>
<html dir="ltr" lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta content="text/html; charset=UTF-8" http-equiv="Content-Type" />
    <meta name="x-apple-disable-message-reformatting" />
    <title>Your response has been captured</title>
</head>

<body style="margin: 0; padding: 0; background-color: #ecebe6">
    <table border="0" width="100%" cellpadding="0" cellspacing="0" role="presentation"
        style="background-color: #ecebe6">
        <tbody>
            <tr>
                <td align="center" style="
              padding: 32px 16px;
              font-family:
                -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto,
                &quot;Helvetica Neue&quot;, Arial, sans-serif;
            ">
                    <!-- card -->
                    <table align="center" width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation"
                        style="
                max-width: 480px;
                background-color: #e6e4dd;
                border: 1px solid #d9d6cd;
                border-radius: 14px;
                overflow: hidden;
              ">
                        <tbody>
                            <!-- accent bar -->
                            <tr>
                                <td style="height: 6px; background-color: {{accent}}; line-height: 6px; font-size: 0">
                                    &nbsp;
                                </td>
                            </tr>

                            <!-- brand -->
                            <tr>
                                <td style="padding: 28px 32px 0 32px">
                                    <div style="
                        font-family:
                          Georgia, &quot;Times New Roman&quot;, serif;
                        font-weight: 700;
                        font-size: 18px;
                        letter-spacing: 0.04em;
                        text-transform: uppercase;
                        color: #1c1b19;
                        line-height: 1.1;
                      ">
                                        Invytt
                                    </div>
                                    <div style="
                        font-family:
                          Georgia, &quot;Times New Roman&quot;, serif;
                        font-style: italic;
                        font-size: 15px;
                        color: #4a4843;
                      ">
                                        Enterprise
                                    </div>
                                </td>
                            </tr>

                            <!-- detail box -->
                            <tr>
                                <td style="padding: 24px 32px 0 32px">
                                    <table width="100%" border="0" cellpadding="0" cellspacing="0" role="presentation"
                                        style="
                        background-color: #efeee8;
                        border: 1px solid #d9d6cd;
                        border-radius: 10px;
                      ">
                                        <tbody>
                                            <tr>
                                                <td style="padding: 16px 18px">
                                                    <div style="
                                font-size: 12px;
                                text-transform: uppercase;
                                letter-spacing: 0.05em;
                                color: #8a877f;
                              ">
                                                        Event
                                                    </div>
                                                    <div style="
                                font-size: 16px;
                                font-weight: 600;
                                color: #1c1b19;
                                margin-top: 2px;
                              ">
                                                        {{event_name}}
                                                    </div>
                                                    <div style="
                                font-size: 12px;
                                text-transform: uppercase;
                                letter-spacing: 0.05em;
                                color: #8a877f;
                                margin-top: 12px;
                              ">
                                                        When
                                                    </div>
                                                    <div style="
                                font-size: 15px;
                                color: #1c1b19;
                                margin-top: 2px;
                              ">
                                                        {{when}}
                                                    </div>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </td>
                            </tr>

                            <!-- heading + lead -->
                            <tr>
                                <td style="padding: 24px 32px 0 32px">
                                    <h1 style="
                        margin: 0 0 8px 0;
                        font-size: 22px;
                        line-height: 1.25;
                        color: #1c1b19;
                      ">
                                        Hi {{guest_name}}
                                    </h1>
                                </td>
                            </tr>

                            <!-- note -->
                            <tr>
                                <td style="padding: 16px 32px 0 32px">
                                    <p style="
                        margin: 0;
                        font-size: 13px;
                        line-height: 1.5;
                        color: #6b6862;
                      ">
                                        Your response has been captured. The host has been
                                        notified and will get back to you with any updates soon.
                                    </p>
                                </td>
                            </tr>

                            <!-- cta -->
                            <tr>
                                <td style="padding: 20px 32px 0 32px">
                                    <a href="{{cta_url}}" rel="noopener noreferrer" style="
                        display: inline-block;
                        background-color: #1c1b19;
                        color: #ffffff;
                        text-decoration: none;
                        font-size: 14px;
                        font-weight: 600;
                        padding: 11px 22px;
                        border-radius: 8px;
                      ">View your invite</a>
                                </td>
                            </tr>

                            <!-- footer -->
                            <tr>
                                <td style="padding: 24px 32px 28px 32px">
                                    <hr style="
                        border: none;
                        border-top: 1px solid #d9d6cd;
                        margin: 0 0 14px 0;
                      " />
                                    <p style="
                        margin: 0;
                        font-size: 12px;
                        line-height: 18px;
                        color: #a6a09b;
                      ">
                                        <a href="https://invytt.com" rel="noopener noreferrer"
                                            style="color: #a6a09b; text-decoration: none">Invytt</a>
                                        · Enterprise<br />
                                    </p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </td>
            </tr>
        </tbody>
    </table>
</body>

</html>
